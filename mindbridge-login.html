<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindBridge</title>

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <!-- Ícone da aba -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!-- Estilos -->
    <link rel="stylesheet" href="mindbridge-login.css">

</head>

<body>
    <!-- Sistema de Login -->
    
    <main class="login-container">
        <div class="container-1">
            <div>
                <h2>MindBridge</h2>
            </div>

            <div>
                <h3>Você não precisa passar por isso sozinho.</h3>

                <p>
                    Conectamos você a recursos, profissionais e comunidades de apoio em saúde mental.
                </p>
            </div>

            <div>
                <ul class="lista">
                    <li>
                        Apoio Emocional
                    </li>
                    <li>
                        Comunidade
                    </li>
                    <li>
                        Seguro & Privado
                    </li>
                </ul>
            </div>

        </div>

        <div class="container-2">
            <div class="form-wrapper">
                <h2> Bem vindo de volta</h2>
                <p>
                    Entre para continuar sua jornada
                </p>
                <form class="loginForm">
                    
                    <div class="input-group">
                        <input type="email" id="email" placeholder=" " required>
                        <label for="email">E-mail</label>
                    </div>

                    <div class="input-group">
                        <input type="password" id="password" placeholder=" " required>
                        <label for="password">Senha</label>
                        <button type="button" class="btn-ver-senha" id="btn-ver-senha">
                            <i class="ti ti-eye"></i>
                        </button>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="lembrar">
                        <label for="lembrar">Lembrar de mim</label>
                    </div>
                
                    <button type="submit">Entrar</button>
                </form>

                <div>
                    <p class="ou-divider">ou</p>

                    <div>
                        <button class="btn-google" type="button">Continuar com Google</button>
                    </div>

                    <p class="no-conta">
                        Não tem conta? <a href="#">Criar agora</a>
                    </p>
                </div>

            </div>
        </div>


    </main>

    <script src="script.js" defer></script>
</body>
    
</html>
